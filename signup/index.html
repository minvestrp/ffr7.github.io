<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign Up — SmartSec</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080810;--bg2:#0d0d18;--surface:#131325;--surface2:#1a1a32;--border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);--cyan:#00d4ff;--purple:#7c3aed;--green:#22c55e;--red:#ef4444;--text:#f0f0ff;--text2:#9090b0;--text3:#404060}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.nav{position:fixed;top:0;left:0;right:0;padding:14px 32px;display:flex;align-items:center;justify-content:space-between;background:rgba(8,8,16,.9);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);z-index:10}
.logo{font-size:1rem;font-weight:800;color:var(--text);text-decoration:none}
.logo b{color:var(--cyan)}
.nav-link{font-size:.85rem;color:var(--text2);text-decoration:none;transition:color .2s}
.nav-link:hover{color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px;width:100%;max-width:440px;margin-top:60px}
.card-title{font-size:1.5rem;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.card-sub{font-size:.88rem;color:var(--text2);margin-bottom:28px;line-height:1.6}
label{display:block;font-size:.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}
.inp{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border .2s;font-family:'Inter',sans-serif}
.inp:focus{border-color:var(--cyan)}
.inp::placeholder{color:var(--text3)}
.form-row{margin-bottom:16px}
.btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--cyan),var(--purple));border:none;border-radius:12px;color:#fff;font-weight:700;font-size:.95rem;cursor:pointer;transition:opacity .2s;margin-top:6px;letter-spacing:.01em}
.btn-submit:hover{opacity:.88}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:.8rem}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-demo{width:100%;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text2);font-weight:600;font-size:.88rem;cursor:pointer;transition:all .2s}
.btn-demo:hover{border-color:var(--cyan);color:var(--cyan)}
.signin-link{text-align:center;margin-top:20px;font-size:.82rem;color:var(--text3)}
.signin-link a{color:var(--cyan);text-decoration:none}
.err{color:var(--red);font-size:.78rem;margin-top:6px;display:none}
.err.show{display:block}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.benefits{margin-bottom:24px;display:flex;flex-direction:column;gap:7px}
.benefit{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--text2)}
.benefit span{color:var(--green);font-size:.9rem}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="logo">⬡ Smart<b>Sec</b></a>
  <a href="/admin/" class="nav-link">Sign in →</a>
</nav>

<div class="card">
  <div class="card-title">Create your account</div>
  <div class="card-sub">Get API key instantly. Start building in minutes.</div>

  <div class="benefits">
    <div class="benefit"><span>✅</span> Instant API key — no waiting</div>
    <div class="benefit"><span>✅</span> 8 games ready to integrate</div>
    <div class="benefit"><span>✅</span> Free sandbox plan</div>
    <div class="benefit"><span>✅</span> No credit card required</div>
  </div>

  <form id="signupForm" onsubmit="doSignup(event)">
    <div class="form-row">
      <label>Email</label>
      <input class="inp" type="email" id="email" placeholder="you@casino.com" required autocomplete="email"/>
    </div>
    <div class="form-row">
      <label>Username</label>
      <input class="inp" type="text" id="username" placeholder="myoperator" required autocomplete="username"/>
    </div>
    <div class="form-row">
      <label>Company Name</label>
      <input class="inp" type="text" id="company" placeholder="Lucky Casino" autocomplete="organization"/>
    </div>
    <div class="form-row">
      <label>Password</label>
      <input class="inp" type="password" id="password" placeholder="••••••••" required autocomplete="new-password" minlength="8"/>
    </div>
    <div class="err" id="errMsg"></div>
    <button type="submit" class="btn-submit" id="submitBtn">Create Account & Get API Key →</button>
  </form>

  <div class="divider">or</div>
  <button class="btn-demo" onclick="tryDemo()">🎮 Try Demo — No Signup</button>

  <div class="signin-link">Already have an account? <a href="/admin/">Sign in</a></div>
</div>

<script>
async function doSignup(e) {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const err = document.getElementById('errMsg');
  err.classList.remove('show');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Creating account…';

  const body = {
    email: document.getElementById('email').value.trim(),
    password: document.getElementById('password').value,
    username: document.getElementById('username').value.trim(),
    company_name: document.getElementById('company').value.trim() || undefined
  };

  try {
    const r = await fetch('/api/v1/auth/signup', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body),
      signal: AbortSignal.timeout(12000)
    });
    const data = await r.json();

    if (r.ok) {
      sessionStorage.setItem('ss_token', data.access_token);
      sessionStorage.setItem('ss_operator_id', data.operator_id);
      sessionStorage.setItem('ss_username', data.username);
      sessionStorage.setItem('ss_api_key', data.api_key);
      sessionStorage.setItem('ss_new_signup', '1');
      window.location.href = '/onboarding/';
    } else {
      err.textContent = data.detail || 'Signup failed. Try again.';
      err.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Create Account & Get API Key →';
    }
  } catch(ex) {
    err.textContent = 'Network error. Please try again.';
    err.classList.add('show');
    btn.disabled = false;
    btn.textContent = 'Create Account & Get API Key →';
  }
}

async function tryDemo() {
  try {
    const r = await fetch('/api/v1/auth/demo-login', {method:'POST', signal:AbortSignal.timeout(8000)});
    if (r.ok) {
      const d = await r.json();
      sessionStorage.setItem('ss_token', d.access_token);
      sessionStorage.setItem('ss_operator_id', d.operator_id);
      sessionStorage.setItem('ss_username', d.username);
      sessionStorage.setItem('ss_is_demo', 'true');
    }
  } catch(e) {}
  sessionStorage.setItem('ss_is_demo', 'true');
  window.location.href = '/admin/';
}
</script>
</body>
</html>
