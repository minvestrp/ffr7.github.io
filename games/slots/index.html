<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Slots — SmartSec Games</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0a0a0f;--surface:#1a1a2e;--surface2:#1e1e35;--border:rgba(255,255,255,0.08);--cyan:#00d4ff;--purple:#7c3aed;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--gold:#f59e0b;--text:#f0f0ff;--text2:#a0a0c0;--text3:#505070;--r:10px}
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow:hidden}
    .wrap{display:flex;flex-direction:column;height:100vh}
    .hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);height:56px;flex-shrink:0}
    .logo{font-size:1rem;font-weight:700;color:var(--text);text-decoration:none}.logo b{color:var(--cyan)}
    .game-ttl{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;letter-spacing:.1em;color:var(--gold)}
    .bal-val{font-family:'JetBrains Mono',monospace;font-size:1rem;font-weight:700;color:var(--cyan)}
    .bal-lbl{font-size:.7rem;color:var(--text3);display:block;text-transform:uppercase}
    .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:20px;overflow:auto}
    /* MACHINE */
    .machine{background:linear-gradient(180deg,var(--surface),var(--surface2));border:2px solid var(--gold);border-radius:24px;padding:24px;width:100%;max-width:500px;box-shadow:0 0 40px rgba(245,158,11,.15)}
    .machine-top{text-align:center;margin-bottom:16px}
    .jackpot-text{font-family:'JetBrains Mono',monospace;font-size:.8rem;color:var(--gold);letter-spacing:.1em;text-transform:uppercase}
    .jackpot-val{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(245,158,11,.4)}
    /* REELS */
    .reels-wrap{display:flex;gap:8px;background:rgba(0,0,0,.5);border-radius:16px;padding:12px;border:1px solid rgba(245,158,11,.2);margin-bottom:16px;position:relative;overflow:hidden}
    .win-line{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--gold);transform:translateY(-50%);opacity:0;transition:opacity .3s;z-index:10}
    .win-line.show{opacity:1}
    .reel{flex:1;height:160px;border-radius:10px;background:rgba(0,0,0,.4);border:1px solid var(--border);overflow:hidden;position:relative}
    .reel-inner{position:absolute;width:100%;transition:transform .05s linear;display:flex;flex-direction:column;align-items:center}
    .sym{width:100%;height:53px;display:flex;align-items:center;justify-content:center;font-size:2.2rem;flex-shrink:0}
    .sym.highlight{background:rgba(245,158,11,.15)}
    /* PAYTABLE */
    .paytable{width:100%;max-width:500px;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px}
    .pt-title{font-size:.75rem;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-bottom:10px;text-align:center}
    .pt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .pt-item{background:var(--surface2);border-radius:8px;padding:8px;text-align:center}
    .pt-sym{font-size:1.3rem;margin-bottom:2px}
    .pt-mult{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:700;color:var(--gold)}
    /* CONTROLS */
    .controls{width:100%;max-width:500px;display:flex;gap:12px;align-items:center}
    .bet-group{display:flex;flex-direction:column;gap:6px;flex:1}
    .bet-lbl{font-size:.72rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;font-weight:700}
    .bet-row{display:flex;gap:6px}
    .qb{padding:6px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text3);font-size:.75rem;font-weight:600;cursor:pointer;transition:all .2s}
    .qb:hover{border-color:var(--gold);color:var(--gold)}
    .bet-inp{background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.95rem;padding:9px 12px;text-align:center;width:100px}
    .bet-inp:focus{outline:none;border-color:var(--gold)}
    .btn-spin{padding:14px 32px;background:linear-gradient(135deg,var(--gold),#d97706);color:#000;border:none;border-radius:var(--r);font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;white-space:nowrap;box-shadow:0 4px 20px rgba(245,158,11,.3)}
    .btn-spin:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 28px rgba(245,158,11,.4)}
    .btn-spin:disabled{opacity:.4;cursor:not-allowed;transform:none}
    /* WIN DISPLAY */
    .win-display{min-height:44px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:1.4rem;font-weight:700}
    .win-display.big-win{color:var(--gold);animation:winPulse .5s ease-in-out 4;text-shadow:0 0 30px rgba(245,158,11,.5)}
    .win-display.loss{color:var(--text3);font-size:1rem}
    @keyframes winPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
    .confetti-piece{position:fixed;pointer-events:none;width:8px;height:8px;border-radius:2px;animation:confettiFall linear forwards}
    @keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
    .toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:10px;font-weight:700;font-size:.9rem;z-index:1000;pointer-events:none}
    .tw{background:rgba(34,197,94,.2);border:1px solid rgba(34,197,94,.4);color:var(--green)}
    .tl{background:rgba(239,68,68,.2);border:1px solid rgba(239,68,68,.4);color:var(--red)}
  </style>
</head>
<body>
<div class="wrap">
  <header class="hdr">
    <a href="/smartsec/games/" class="logo">⬡ Smart<b>Sec</b> / Games</a>
    <div class="game-ttl">SLOTS 🎰</div>
    <div style="text-align:right"><span class="bal-lbl">Balance</span><span class="bal-val" id="bal">$1,000.00</span></div>
  </header>
  <div class="main">
    <div class="machine">
      <div class="machine-top">
        <div class="jackpot-text">JACKPOT</div>
        <div class="jackpot-val" id="jackpot">$12,480.00</div>
      </div>
      <div class="reels-wrap">
        <div class="win-line" id="winLine"></div>
        <div class="reel" id="r0"><div class="reel-inner" id="ri0"></div></div>
        <div class="reel" id="r1"><div class="reel-inner" id="ri1"></div></div>
        <div class="reel" id="r2"><div class="reel-inner" id="ri2"></div></div>
        <div class="reel" id="r3"><div class="reel-inner" id="ri3"></div></div>
        <div class="reel" id="r4"><div class="reel-inner" id="ri4"></div></div>
      </div>
      <div class="win-display" id="winDisplay">Spin to win!</div>
    </div>
    <div class="controls">
      <div class="bet-group">
        <div class="bet-lbl">Bet per line</div>
        <div class="bet-row">
          <input type="number" class="bet-inp" id="betInp" value="10" min="1"/>
          <button class="qb" onclick="sb(5)">$5</button>
          <button class="qb" onclick="sb(10)">$10</button>
          <button class="qb" onclick="sb(25)">$25</button>
          <button class="qb" onclick="sb(50)">$50</button>
        </div>
      </div>
      <button class="btn-spin" id="spinBtn" onclick="spin()">🎰 SPIN</button>
    </div>
    <div class="paytable">
      <div class="pt-title">Paytable (3 of a kind)</div>
      <div class="pt-grid">
        <div class="pt-item"><div class="pt-sym">💎</div><div class="pt-mult">1000×</div></div>
        <div class="pt-item"><div class="pt-sym">🌟</div><div class="pt-mult">500×</div></div>
        <div class="pt-item"><div class="pt-sym">7️⃣</div><div class="pt-mult">200×</div></div>
        <div class="pt-item"><div class="pt-sym">🍀</div><div class="pt-mult">50×</div></div>
        <div class="pt-item"><div class="pt-sym">🔔</div><div class="pt-mult">25×</div></div>
        <div class="pt-item"><div class="pt-sym">🍇</div><div class="pt-mult">10×</div></div>
        <div class="pt-item"><div class="pt-sym">🍋</div><div class="pt-mult">5×</div></div>
        <div class="pt-item"><div class="pt-sym">🍒</div><div class="pt-mult">3×</div></div>
        <div class="pt-item"><div class="pt-sym">⭐</div><div class="pt-mult">Wild</div></div>
      </div>
    </div>
  </div>
</div>
<script>
const SYMS=['💎','🌟','7️⃣','🍀','🔔','🍇','🍋','🍒','⭐'];
const WEIGHTS=[1,2,3,5,8,12,15,18,5];
const PAYS={'💎':1000,'🌟':500,'7️⃣':200,'🍀':50,'🔔':25,'🍇':10,'🍋':5,'🍒':3};
let bal=1000,jackpot=12480,spinning=false;

function sb(v){document.getElementById('betInp').value=v}

function weightedRandom(){
  const total=WEIGHTS.reduce((a,b)=>a+b,0);
  let r=Math.random()*total;
  for(let i=0;i<SYMS.length;i++){r-=WEIGHTS[i];if(r<=0)return SYMS[i]}
  return SYMS[SYMS.length-1];
}

// Init reels
for(let r=0;r<5;r++){
  const inner=document.getElementById('ri'+r);
  for(let i=0;i<15;i++){
    const sym=document.createElement('div');
    sym.className='sym';
    sym.textContent=weightedRandom();
    inner.appendChild(sym);
  }
}

function getReelSyms(reel){
  const inner=document.getElementById('ri'+reel);
  const syms=[];
  inner.querySelectorAll('.sym').forEach(s=>syms.push(s.textContent));
  return syms;
}

async function spin(){
  const bet=parseFloat(document.getElementById('betInp').value);
  if(isNaN(bet)||bet<1||bet>bal){toast('Invalid bet','l');return}
  if(spinning)return;
  spinning=true;
  const btn=document.getElementById('spinBtn');
  btn.disabled=true;
  bal=parseFloat((bal-bet).toFixed(2));
  updateBal();
  document.getElementById('winDisplay').textContent='';
  document.getElementById('winDisplay').className='win-display';
  document.getElementById('winLine').classList.remove('show');

  // Generate results first
  const results=Array.from({length:5},()=>weightedRandom());

  // Spin animation per reel
  const spinPromises=results.map((finalSym,r)=>spinReel(r,finalSym,r*120));
  await Promise.all(spinPromises);

  // Evaluate
  evaluateResult(results,bet);
  jackpot+=bet*0.01;
  document.getElementById('jackpot').textContent='$'+jackpot.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',');

  spinning=false;
  btn.disabled=false;
}

function spinReel(reelIdx,finalSym,delay){
  return new Promise(resolve=>{
    setTimeout(async()=>{
      const inner=document.getElementById('ri'+reelIdx);
      const duration=600+reelIdx*200;
      const end=Date.now()+duration;

      const interval=setInterval(()=>{
        inner.querySelectorAll('.sym').forEach(s=>s.textContent=weightedRandom());
        if(Date.now()>=end){
          clearInterval(interval);
          // Set middle symbol to result
          const syms=inner.querySelectorAll('.sym');
          syms[1].textContent=finalSym;
          syms[1].style.background='rgba(245,158,11,0.1)';
          setTimeout(()=>syms[1].style.background='',500);
          resolve();
        }
      },60);
    },delay);
  });
}

function evaluateResult(results,bet){
  // Count occurrences
  const counts={};
  let wild=0;
  results.forEach(s=>{
    if(s==='⭐'){wild++;return}
    counts[s]=(counts[s]||0)+1;
  });

  let bestMult=0,bestSym='';
  Object.entries(counts).forEach(([sym,count])=>{
    const effective=count+wild;
    if(effective>=3&&PAYS[sym]){
      const mult=PAYS[sym]*(effective===5?3:effective===4?2:1);
      if(mult>bestMult){bestMult=mult;bestSym=sym}
    }
  });

  // Jackpot
  if(results.filter(s=>s==='💎').length===5||results.every(s=>s==='💎'||s==='⭐')){
    const jw=jackpot;
    jackpot=1000;
    bal=parseFloat((bal+jw).toFixed(2));
    updateBal();
    document.getElementById('winDisplay').textContent='🎉 JACKPOT! +$'+jw.toFixed(2);
    document.getElementById('winDisplay').className='win-display big-win';
    document.getElementById('winLine').classList.add('show');
    spawnConfetti();
    toast('🎉 JACKPOT! $'+jw.toFixed(2),'w');
    return;
  }

  if(bestMult>0){
    const win=parseFloat((bet*bestMult).toFixed(2));
    bal=parseFloat((bal+win).toFixed(2));
    updateBal();
    document.getElementById('winDisplay').textContent=`${bestSym} × ${bestMult} = +$${win}`;
    document.getElementById('winDisplay').className='win-display big-win';
    document.getElementById('winLine').classList.add('show');
    if(bestMult>=50) spawnConfetti();
    toast(`✅ Won $${win} (${bestMult}×)`,'w');
  } else {
    document.getElementById('winDisplay').textContent='No win — try again';
    document.getElementById('winDisplay').className='win-display loss';
    toast(`Lost $${bet}`,'l');
  }
}

function spawnConfetti(){
  const colors=['#f59e0b','#00d4ff','#7c3aed','#22c55e','#ef4444'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${1+Math.random()*2}s;animation-delay:${Math.random()*.5}s`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3000);
  }
}

function updateBal(){document.getElementById('bal').textContent='$'+bal.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,',')}
function toast(msg,t){const el=document.createElement('div');el.className=`toast t${t}`;el.textContent=msg;document.body.appendChild(el);setTimeout(()=>el.remove(),3000)}
</script>
</body>
</html>
